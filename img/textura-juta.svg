<svg xmlns="http://www.w3.org/2000/svg"
     width="300"
     height="300"
     viewBox="0 0 300 300">

    <defs>

        <pattern id="juta"
                 width="16"
                 height="16"
                 patternUnits="userSpaceOnUse">

            <!-- Fundo -->

            <rect width="16"
                  height="16"
                  fill="#F6F0E4"/>

            <!-- Fios Verticais -->

            <line x1="2"
                  y1="0"
                  x2="2"
                  y2="16"
                  stroke="#E7DDCB"
                  stroke-width="0.6"/>

            <line x1="6"
                  y1="0"
                  x2="6"
                  y2="16"
                  stroke="#ECE2D2"
                  stroke-width="0.4"/>

            <line x1="10"
                  y1="0"
                  x2="10"
                  y2="16"
                  stroke="#E4D9C5"
                  stroke-width="0.5"/>

            <line x1="14"
                  y1="0"
                  x2="14"
                  y2="16"
                  stroke="#EBE1D0"
                  stroke-width="0.5"/>

            <!-- Fios Horizontais -->

            <line x1="0"
                  y1="2"
                  x2="16"
                  y2="2"
                  stroke="#E6DBC8"
                  stroke-width="0.5"/>

            <line x1="0"
                  y1="6"
                  x2="16"
                  y2="6"
                  stroke="#EEE5D6"
                  stroke-width="0.4"/>

            <line x1="0"
                  y1="10"
                  x2="16"
                  y2="10"
                  stroke="#E5D9C8"
                  stroke-width="0.5"/>

            <line x1="0"
                  y1="14"
                  x2="16"
                  y2="14"
                  stroke="#ECE3D3"
                  stroke-width="0.4"/>

            <!-- Pequenas fibras -->

            <circle cx="4"
                    cy="11"
                    r="0.35"
                    fill="#D8C8AF"/>

            <circle cx="12"
                    cy="5"
                    r="0.30"
                    fill="#DCCDB7"/>

            <circle cx="8"
                    cy="14"
                    r="0.25"
                    fill="#D7C7AF"/>

            <circle cx="14"
                    cy="9"
                    r="0.25"
                    fill="#DDD0BC"/>

        </pattern>

    </defs>

    <rect width="100%"
          height="100%"
          fill="url(#juta)"/>

</svg>